name: EAS Build APK

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Mensagem opcional para identificar a build"
        required: false
        default: ""
  push:
    tags:
      - "v*-test"

jobs:
  build:
    name: Build APK (preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo e EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8.2.1
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate build message input
        env:
          RAW_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          if [[ -n "$RAW_MESSAGE" && ! "$RAW_MESSAGE" =~ ^[A-Za-z0-9\ ._-]{0,80}$ ]]; then
            echo "::error::Mensagem contém caracteres inválidos ou excede 80 chars. Permitido: letras, números, espaço, ponto, underline, hífen."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --ci

      - name: EAS Build (Android, preview, APK)
        run: eas build --platform android --profile preview --non-interactive --no-wait
        env:
          EAS_BUILD_MESSAGE: ${{ github.event.inputs.message }}
