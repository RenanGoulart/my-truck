name: EAS Build APK

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Mensagem opcional para identificar a build"
        required: false
        default: ""
  push:
    tags:
      - "v*-test"

jobs:
  build:
    name: Build APK (preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo e EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --ci

      - name: EAS Build (Android, preview, APK)
        run: eas build --platform android --profile preview --non-interactive --no-wait
        env:
          EAS_BUILD_MESSAGE: ${{ github.event.inputs.message }}
